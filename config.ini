# ============================================================
#  Real-Time Market Data Stream Processor — Configuration
# ============================================================

[processor]
symbols           = AAPL,GOOGL,MSFT,AMZN,TSLA,NVDA,JPM,BAC
thread_count      = 4
update_frequency_ms = 10
demo_duration_sec = 30

[logging]
# Levels: DEBUG | INFO | WARN | ERROR
level        = INFO
log_to_file  = false
log_file     = market_data.log

[alerts]
# Format: SYMBOL_above = PRICE  or  SYMBOL_below = PRICE
AAPL_above = 200.0
TSLA_below = 150.0
